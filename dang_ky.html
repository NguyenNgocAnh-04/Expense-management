<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dang ky</title>
        <!--css-->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="dang_ky.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    </head>

        <div class="khung-lon">
            <div class="khung-dang-ky">
                <h2>Đăng ký</h2>
                <br>
                <form>

                    <br><br>
                    <input type="email" id="email" placeholder="Email">
                    <br><br>
                    <input type="password" id="matKhau" placeholder="Mật khẩu">
                    <br><br>
                    <input type="password" id="xacNhanMatKhau" placeholder="Xác nhận mật khẩu">
                    <br><br>
                    <div class="dang-ky">
                        <button id="buttonDangKy">Đăng ký</button>
                    </div>
                </form>
            </div>
           
        </div>
        <script src="js/dang_ky.js"></script>
    </body>
