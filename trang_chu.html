<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trang chu</title>
        <!--css-->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="trang_chu.css">

    </head>
    <body>
        <!--sidebar-->
        <nav class="sidebar">
            <h2>Quản lý chi tiêu</h2>
            
                <p>Tổng quan</p>
                <p>Giao dịch</p>
                <p>Danh mục</p>
                <p>Biểu đồ</p>
                <p>Cài đặt</p>
            
        </nav>

        <!--nội dung-->
        <main class="noi-dung">
            <!--navbar-->
            <header class="navbar">
                <h2>Tổng quan</h2>
                <!--Tạo card riêng-->
                <button onclick="themCard()">
                    Thêm card
                </button>
            </header>
            <div class="cards">
                <section class="card">
                    <h3>Tổng thu</h3>
                    <p>0 VNĐ</p>
                </section>
                <section class="card">
                    <h3>Tổng chi</h3>
                    <p>0 VNĐ</p>
                </section>
                <section class="card">
                    <h3>Số dư hiện tại</h3>
                    <p>0 VNĐ</p>
                </section>
                <section class="card">
                    <h3>Tỉ lệ chi tiêu</h3>
                    <p>0 %</p>
                </section>
            </div>
            
            
           
            <!--tạo biểu đồ-->
            <section class="bieu-do">
                <h3>Biểu đồ chi tiêu</h3>
            </section>
        </main>
    </body>
</html>
