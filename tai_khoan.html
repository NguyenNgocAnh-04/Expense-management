<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thong tin ca nhan</title>
        <!--css-->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="tai_khoan.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    </head>
    <body>
        <!--sidebar-->
        <nav class="sidebar">
            <div class="profile">
                <img src="anime picture.jpg" alt="avatar">
                <h3>Ahhihi</h3>
            </div>
            <br>
            <a href="trang_chu.html">🏠 Trang chủ</a>
            <a href="giao_dich.html">💰 Giao dịch</a>
            <a href="danh_muc.html">📂 Danh mục</a>
            <a href="tai_khoan.html" class="active">👤 Tài khoản</a>
        </nav>
        <div class="noi-dung">
            <h2>Thông tin cá nhân</h2>
            <br><br>
            <div class="thong-tin">
                <!--Tạo các khung thông tin người dùng-->
                <div class="thong-tin-item" id="item-anh">
                    <div class="icon">📷</div>
                    <div class="content">
                        <h3>Ảnh hồ sơ</h3>
                        <p id="thay-anh">Nhấn để thay ảnh</p>
                    </div>
                    <div class="avatar" id="avatar-box">
                        <img id="avatar-img" src="" alt="avatar">
                    </div>
                </div>

                <div class="thong-tin-item" id="item-ho-ten">
                    <div class="icon">👤</div>
                    <div class="content">
                        <h3>Họ và Tên</h3>
                        <p id="hien-thi-ho-ten">Chưa cập nhật</p>
                    </div>
                </div>

                <div class="thong-tin-item" id="item-gioi-tinh">
                    <div class="icon">⚧</div>
                    <div class="content">
                        <h3>Giới tính</h3>
                        <p id="hien-thi-gioi-tinh">Chưa cập nhật</p>
                    </div>
                </div>

                <div class="thong-tin-item" id="item-email">
                    <div  class="icon">✉</div>
                    <div class="content">
                        <h3>Email</h3>
                        <p id="hien-thi-email">Chưa cập nhật</p>
                    </div>
                </div>

                <div class="thong-tin-item" id="item-so-dien-thoai">
                    <div class="icon">📞</div>
                    <div class="content">
                        <h3>Số điện thoại</h3>
                        <p id="hien-thi-so-dien-thoai">Chưa cập nhật</p>
                    </div>
                </div>

                <div class="thong-tin-item" id="item-ngay-sinh">
                    <div class="icon">🎂</div>
                    <div class="content">
                        <h3>Ngày sinh</h3>
                        <p id="hien-thi-ngay-sinh">Chưa cập nhật</p>
                    </div>
                </div>
            </div>
            <input type="file" id="input-file-avatar" accept="image/*" style="display:none">
            
            <div id="popup-chinh-sua" class="popup">
                <div class="popup-content">
                    <h2 id="tieu-de-popup">
                        Chỉnh sửa
                    </h2>
                    <div id="noi-dung-popup">
                        <input
                            type="text"
                            id="input-popup">
                    </div>
                    <div class="popup-buttons">
                        <button id="nut-luu-popup">
                            Lưu
                        </button>
                        <button id="nut-huy-popup">
                            Hủy
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script src ="js/tai_khoan.js" ></script>
        <script src="js/sidebar.js"></script>
    </body>
</html>
