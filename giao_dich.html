<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Giao dich</title>
        <!--css-->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="giao_dich.css">

    </head>
    <body>
        <!--sidebar-->
        <nav class="sidebar">
            <h2>Quản lý chi tiêu</h2>
                <a href="trang_chu.html">Trang chủ</a>
                <a href="giao_dich.html">Giao dịch</a>
                <a href="danh_muc.html">Danh mục</a>
                <a href="thong_ke.html">Thống kê</a>
                <a href="tai_khoan.html">Tài khoản</a>
        </nav>
        <div class="noi-dung">
            <div class="navbar">
                <h2>Quản lý giao dịch</h2>
                <h4>Theo dõi các khoản thu chi</h4>
                <br><br>
            </div>
            <div class="mau-giao-dich">
                <h3>Thêm giao dịch</h3>
                <br>
                <form>
                    <div class="hang-input">
                        <input type="text" placeholder="Tên giao dịch">
                        <input type="number" placeholder="Số tiền">
                        
                        <select>
                            <option>Thu</option>
                            <option>Chi</option>
                        </select>
                        <input type="date" >
                        <select>
                            <option>Ăn uống</option>
                            <option>Đi lại</option>
                            <opiton>Học tập</opiton>
                            <option>Lương</option>
                            <option>Giải trí</option>
                        </select>
                    </div>                   
                    <button id="nut-them-giao-dich">Thêm giao dịch</button>
                </form>
            </div>
            <div class="bang-giao-dich">
                <h3>Danh sách giao dịch</h3>
                <br>
                <table border="1">
                    <tr>
                        <th>Ngày</th>
                        <th>Tên giao dịch</th>
                        <th>Số tiền</th>
                        <th>Loại</th>
                        <th>Danh mục</th>
                        <th>Thao tác</th>
                    </tr>
                    
                    <tr>
                        <td>09/06/2026</td>
                        <td>Đi lại</td>
                        <td>20</td>
                        <td>Chi</td>
                        <td>Đi lại</td>
                        <td>
                            <button>Xóa</button>
                        </td>
                    </tr>
                </table>
            </div>
            <br>
            <!--tạo popup-->
            <div class="popup">
                <p>Thêm giao dịch thành công</p>
                <button>Đóng</button>
            </div>
        </div>
        <script src="giao_dich.js"></script>
    </body>
</html>
