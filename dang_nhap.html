<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dang nhap</title>
        <!--css-->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="dang_nhap.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        
    </head>
    <body>
        <div class="khung-lon">
            <div class="khung-dang-nhap">
                <h2>Đăng nhập</h2>
                <br>
                <form>
                    <!--Tạo ô nhập tên đăng nhập-->
                    <input type="text" id="tenDangNhap" placeholder="Nhập tên đăng nhập">
                    <br><br>
                    <!--Tạo ô nhập mật khẩu-->
                    <input type="password" id="mk" placeholder="Nhập mật khẩu">
                    <br><br><br>
                </form>
                    <!--Tạo nút bấm đn-->
                    
                    <button id="buttonDangNhap">Đăng nhập</button>
                      
                    <div class="duong-ke">
                        <span>Hoặc</span>
                    </div>
                    <div class="dang-ky">
                        <p>Bạn chưa có tài khoản?</p>
                        <button id="nut-dang-ky">
                            <a href="dang_ky.html"> Đăng ký </a>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script src="js/dang_nhap.js"></script>
    </body>
</html>
